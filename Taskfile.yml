version: "3"

vars:
  BINARY: bestow
  MODULE: github.com/redpierrot/bestow
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "none"
  DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  LDFLAGS: >-
    -X {{.MODULE}}/cmd.version={{.VERSION}}
    -X {{.MODULE}}/cmd.commit={{.COMMIT}}
    -X {{.MODULE}}/cmd.buildDate={{.DATE}}

tasks:
  default:
    silent: true
    cmds:
      - task --list

  setup:
    desc: Verify required dev tools are installed
    silent: true
    cmds:
      - which golangci-lint > /dev/null && echo "- golangci-lint installed" || echo "- golangci-lint not installed → brew install golangci-lint"
      - which goimports > /dev/null && echo "- goimports installed" || echo "- goimports not installed → go install golang.org/x/tools/cmd/goimports@latest"

  build:
    desc: Build the binary to ./bin/bestow
    cmds:
      - mkdir -p bin
      - go build -ldflags "{{.LDFLAGS}}" -o bin/{{.BINARY}} .

  install:
    desc: Install bestow with version info
    cmds:
      - go install -ldflags "{{.LDFLAGS}}" .

  test:
    desc: Run tests with race detection
    cmds:
      - go test -race ./...

  lint:
    desc: Run linter (includes format check)
    cmds:
      - golangci-lint run

  fmt:
    desc: Format code with goimports
    cmds:
      - goimports -w .

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/

  coverage:
    desc: Generate coverage reports
    cmds:
      - go test -race -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out
      - go tool cover -html=coverage.out -o coverage.html
